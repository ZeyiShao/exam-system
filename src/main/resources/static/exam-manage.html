<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试管理 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .status-tag {
            padding: 6px 12px;
            border-radius: 16px;
            color: white;
            font-size: 12px;
            white-space: nowrap;
            display: inline-block;
        }

        .status-not { background: #409eff; }
        .status-doing { background: #e6a23c; }
        .status-finished { background: #67c23a; }
        .status-other { background: #909399; }

        .empty {
            text-align: center;
            color: #999;
            padding: 24px 0;
        }

        @media (max-width: 1000px) {
            .table {
                font-size: 12px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title">考试管理</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="title">考试操作</div>

        <div class="top-actions">
            <button class="btn btn-primary" onclick="goAddExam()">新增考试</button>
            <button class="btn btn-gray" onclick="loadExamList()">刷新列表</button>
            <button class="btn btn-gray" onclick="goHome()">返回首页</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div class="card">
        <div class="title">考试列表</div>

        <table class="table">
            <thead>
            <tr>
                <th style="width: 70px;">ID</th>
                <th>考试名称</th>
                <th>试卷</th>
                <th>班级</th>
                <th>课程</th>
                <th>教师</th>
                <th style="width: 170px;">开始时间</th>
                <th style="width: 170px;">结束时间</th>
                <th style="width: 90px;">时长</th>
                <th style="width: 100px;">状态</th>
                <th style="width: 260px;">操作</th>
            </tr>
            </thead>
            <tbody id="examTableBody">
            <tr>
                <td colspan="11">加载中...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentUser = null;
    let examList = [];

    let paperList = [];
    let classList = [];
    let courseList = [];
    let teacherList = [];

    function checkLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "TEACHER" && user.role !== "ADMIN") {
            alert("当前账号没有考试管理权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function showMessage(msg) {
        document.getElementById("message").textContent = msg || "";
    }

    function formatTime(timeStr) {
        if (!timeStr) {
            return "";
        }
        return timeStr.replace("T", " ");
    }

    async function loadBaseData() {
        try {
            const [paperRes, classRes, courseRes, userRes] = await Promise.all([
                get("/paper/list"),
                get("/class/list"),
                get("/course/list"),
                get("/user/list")
            ]);

            if (paperRes.code === 200) {
                paperList = paperRes.data || [];
            }

            if (classRes.code === 200) {
                classList = classRes.data || [];
            }

            if (courseRes.code === 200) {
                courseList = courseRes.data || [];
            }

            if (userRes.code === 200) {
                teacherList = (userRes.data || []).filter(user => user.role === "TEACHER");
            }
        } catch (error) {
            console.error("加载基础数据失败：", error);
            showMessage("部分名称数据加载失败，列表可能显示ID");
        }
    }

    function getPaperName(id) {
        const paper = paperList.find(item => Number(item.id) === Number(id));
        return paper ? paper.paperName : "ID：" + id;
    }

    function getClassName(id) {
        const cls = classList.find(item => Number(item.id) === Number(id));
        return cls ? cls.className : "ID：" + id;
    }

    function getCourseName(id) {
        const course = courseList.find(item => Number(item.id) === Number(id));
        return course ? course.courseName : "ID：" + id;
    }

    function getTeacherName(id) {
        const teacher = teacherList.find(item => Number(item.id) === Number(id));
        return teacher ? (teacher.realName || teacher.username) : "ID：" + id;
    }

    function getRealExamStatus(exam) {
        if (!exam.startTime || !exam.endTime) {
            return exam.status || "UNKNOWN";
        }

        const now = new Date();
        const start = new Date(exam.startTime.replace("T", " "));
        const end = new Date(exam.endTime.replace("T", " "));

        if (now < start) {
            return "NOT_STARTED";
        }

        if (now > end) {
            return "FINISHED";
        }

        return "ONGOING";
    }

    function getStatusText(status) {
        switch (status) {
            case "NOT_STARTED":
                return "未开始";
            case "ONGOING":
            case "DOING":
                return "进行中";
            case "FINISHED":
                return "已结束";
            default:
                return status || "未知";
        }
    }

    function getStatusClass(status) {
        switch (status) {
            case "NOT_STARTED":
                return "status-not";
            case "ONGOING":
            case "DOING":
                return "status-doing";
            case "FINISHED":
                return "status-finished";
            default:
                return "status-other";
        }
    }


    function goAddExam() {
        window.location.href = "exam-edit.html";
    }

    function goEditExam(id) {
        window.location.href = "exam-edit.html?id=" + id;
    }

    function goDetailExam(id) {
        window.location.href = "exam-detail.html?id=" + id;
    }

    async function deleteExam(id) {
        const ok = confirm("确认删除该考试吗？");

        if (!ok) {
            return;
        }

        try {
            const result = await del("/exam/" + id);

            if (result.code !== 200) {
                showMessage(result.message || "删除失败");
                return;
            }

            showMessage(result.message || "删除成功");
            loadExamList();
        } catch (error) {
            console.error("删除考试失败：", error);
            showMessage("无法连接后端，请检查服务是否启动");
        }
    }

    async function loadExamList() {
        const tbody = document.getElementById("examTableBody");
        tbody.innerHTML = `<tr><td colspan="11">加载中...</td></tr>`;
        showMessage("");

        try {
            const result = await get("/exam/list");

            if (result.code !== 200) {
                tbody.innerHTML = `<tr><td colspan="11">${result.message || "查询失败"}</td></tr>`;
                return;
            }

            examList = result.data || [];

            if (examList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="11" class="empty">暂无考试</td></tr>`;
                return;
            }

            tbody.innerHTML = examList.map(exam => {
                const realStatus = getRealExamStatus(exam);

                return `
                    <tr>
                        <td>${exam.id ?? ""}</td>
                        <td>${exam.examName || ""}</td>
                        <td>${getPaperName(exam.paperId)}</td>
                        <td>${getClassName(exam.classId)}</td>
                        <td>${getCourseName(exam.courseId)}</td>
                        <td>${getTeacherName(exam.teacherId)}</td>
                        <td>${formatTime(exam.startTime)}</td>
                        <td>${formatTime(exam.endTime)}</td>
                        <td>${exam.duration ?? ""} 分钟</td>
                        <td>
                            <span class="status-tag ${getStatusClass(realStatus)}">
                                ${getStatusText(realStatus)}
                            </span>
                        </td>
                        <td>
                            <div class="action-buttons">
                                <button class="btn btn-primary" onclick="goDetailExam(${exam.id})">详情</button>
                                <button class="btn btn-primary" onclick="goEditExam(${exam.id})">编辑</button>
                                <button class="btn btn-danger" onclick="deleteExam(${exam.id})">删除</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join("");
        } catch (error) {
            console.error("加载考试列表失败：", error);
            tbody.innerHTML = `<tr><td colspan="11">无法连接后端</td></tr>`;
        }
    }

    async function initPage() {
        currentUser = checkLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + currentUser.realName + "（" + currentUser.role + "）";

        await loadBaseData();
        await loadExamList();
    }

    initPage();
</script>
</body>
</html>
