<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考试成绩 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 18px;
        }

        .toolbar select {
            width: 460px;
        }

        .pass-tag {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 16px;
            color: white;
            font-size: 12px;
            white-space: nowrap;
        }

        .pass-yes {
            background: #67c23a;
        }

        .pass-no {
            background: #f56c6c;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 24px 0;
        }

        @media (max-width: 800px) {
            .toolbar select {
                width: 100%;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .table {
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title">考试成绩查看</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="title">选择考试</div>

        <div class="toolbar">
            <select class="input" id="examSelect">
                <option value="">请选择考试</option>
            </select>

            <button class="btn btn-primary" onclick="loadScoreList()">查询成绩</button>
            <button class="btn btn-gray" onclick="loadExamList()">刷新考试</button>
            <button class="btn btn-gray" onclick="goHome()">返回首页</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div class="card">
        <div class="title">成绩列表</div>

        <table class="table">
            <thead>
            <tr>
                <th style="width: 90px;">记录ID</th>
                <th>考试名称</th>
                <th>学生姓名</th>
                <th style="width: 100px;">成绩</th>
                <th style="width: 100px;">是否通过</th>
                <th style="width: 180px;">提交时间</th>
            </tr>
            </thead>
            <tbody id="scoreTableBody">
            <tr>
                <td colspan="6">请选择考试后查询成绩</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentUser = null;
    let examList = [];
    let scoreList = [];
    let classList = [];
    let courseList = [];

    function checkLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "TEACHER" && user.role !== "ADMIN") {
            alert("当前账号没有成绩查看权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function showMessage(msg) {
        document.getElementById("message").textContent = msg || "";
    }

    function formatTime(timeStr) {
        if (!timeStr) {
            return "暂无";
        }
        return timeStr.replace("T", " ");
    }

    function getClassName(id) {
        const cls = classList.find(item => Number(item.id) === Number(id));
        return cls ? cls.className : "班级ID：" + id;
    }

    function getCourseName(id) {
        const course = courseList.find(item => Number(item.id) === Number(id));
        return course ? course.courseName : "课程ID：" + id;
    }

    function getExamName(id) {
        const exam = examList.find(item => Number(item.id) === Number(id));
        return exam ? exam.examName : "考试ID：" + id;
    }

    async function loadBaseData() {
        try {
            const [classRes, courseRes] = await Promise.all([
                get("/class/list"),
                get("/course/list")
            ]);

            if (classRes.code === 200) {
                classList = classRes.data || [];
            }

            if (courseRes.code === 200) {
                courseList = courseRes.data || [];
            }
        } catch (error) {
            console.error("加载基础数据失败：", error);
            showMessage("部分名称数据加载失败，可能显示ID");
        }
    }

    function renderExamSelect() {
        const select = document.getElementById("examSelect");

        select.innerHTML = `<option value="">请选择考试</option>` +
            examList.map(exam => `
                <option value="${exam.id}">
                    ${exam.examName || "未命名考试"} ｜ ${getClassName(exam.classId)} ｜ ${getCourseName(exam.courseId)}
                </option>
            `).join("");
    }

    async function loadExamList() {
        showMessage("");

        try {
            const result = await get("/exam/list");

            if (result.code !== 200) {
                showMessage(result.message || "考试列表加载失败");
                return;
            }

            examList = result.data || [];
            renderExamSelect();
        } catch (error) {
            console.error("加载考试列表失败：", error);
            showMessage("无法连接后端，请检查服务是否启动");
        }
    }

    async function loadScoreList() {
        const examId = document.getElementById("examSelect").value;
        const tbody = document.getElementById("scoreTableBody");

        showMessage("");

        if (!examId) {
            showMessage("请先选择考试");
            return;
        }

        tbody.innerHTML = `<tr><td colspan="6">成绩加载中...</td></tr>`;

        try {
            const result = await get("/examRecord/exam/" + examId);

            if (result.code !== 200) {
                tbody.innerHTML = `<tr><td colspan="6">${result.message || "查询失败"}</td></tr>`;
                return;
            }

            scoreList = result.data || [];

            if (scoreList.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="empty">暂无成绩记录</td></tr>`;
                return;
            }

            tbody.innerHTML = scoreList.map(item => `
                <tr>
                    <td>${item.recordId ?? ""}</td>
                    <td>${item.examName || getExamName(item.examId)}</td>
                    <td>${item.studentName || ""}</td>
                    <td>${item.score ?? 0}</td>
                    <td>
                        <span class="pass-tag ${item.isPass ? 'pass-yes' : 'pass-no'}">
                            ${item.isPass ? '通过' : '未通过'}
                        </span>
                    </td>
                    <td>${formatTime(item.submitTime)}</td>
                </tr>
            `).join("");
        } catch (error) {
            console.error("加载成绩失败：", error);
            tbody.innerHTML = `<tr><td colspan="6">无法连接后端</td></tr>`;
        }
    }

    async function initPage() {
        currentUser = checkLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + currentUser.realName + "（" + currentUser.role + "）";

        await loadBaseData();
        await loadExamList();
    }

    initPage();
</script>
</body>
</html>
