<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #eef3fb;
        }

        .login-box {
            width: 400px;
            background: #fff;
            padding: 36px 32px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .login-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .login-subtitle {
            text-align: center;
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-item {
            margin-bottom: 18px;
        }

        .form-item label {
            display: block;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .login-btn {
            width: 100%;
            height: 42px;
            font-size: 16px;
            margin-top: 8px;
        }

        .message {
            text-align: center;
            min-height: 22px;
            margin-top: 16px;
        }
    </style>
</head>

<body>
<div class="login-box">
    <div class="login-title">在线考试系统</div>
    <div class="login-subtitle">用户登录</div>

    <div class="form-item">
        <label>用户名</label>
        <input class="input" type="text" id="username" placeholder="请输入用户名">
    </div>

    <div class="form-item">
        <label>密码</label>
        <input class="input" type="password" id="password" placeholder="请输入密码">
    </div>

    <button class="btn btn-primary login-btn" onclick="login()">登录</button>

    <div id="message" class="message"></div>
</div>

<script>
    async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const messageEl = document.getElementById("message");

        messageEl.textContent = "";

        if (!username) {
            messageEl.textContent = "请输入用户名";
            return;
        }

        if (!password) {
            messageEl.textContent = "请输入密码";
            return;
        }

        try {
            const result = await post("/user/login", {
                username: username,
                password: password
            });

            if (result.code !== 200) {
                messageEl.textContent = result.message || "登录失败";
                return;
            }

            const user = result.data;

            if (!user) {
                messageEl.textContent = "登录返回数据异常";
                return;
            }

            setUser(user);

            if (user.role === "STUDENT") {
                window.location.href = "student-home.html";
            } else if (user.role === "TEACHER") {
                window.location.href = "teacher-home.html";
            } else if (user.role === "ADMIN") {
                window.location.href = "admin-home.html";
            } else {
                messageEl.textContent = "未知角色，无法跳转";
            }
        } catch (error) {
            console.error("登录失败：", error);
            messageEl.textContent = "无法连接后端，请检查服务是否启动";
        }
    }

    document.getElementById("password").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            login();
        }
    });

    document.getElementById("username").addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
            login();
        }
    });
</script>
</body>
</html>
