<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的题目 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .toolbar .input {
            width: 180px;
        }

        .status-pending {
            color: #d48806;
            font-weight: bold;
        }

        .status-rejected {
            color: #cf1322;
            font-weight: bold;
        }

        .reject-reason {
            color: #cf1322;
            font-size: 13px;
            line-height: 1.6;
        }

        .tip-box {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #237804;
            padding: 12px 14px;
            border-radius: 6px;
            margin-bottom: 16px;
            line-height: 1.8;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .toolbar .input {
                width: 100%;
            }

            .table {
                font-size: 12px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title">我的题目</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="title">题目提交记录</div>

        <div class="tip-box">
            这里仅展示你自己提交的待审核题目和被驳回题目。被驳回的题目可以修改后重新提交审核；审核通过后的题目会进入正式题库。
        </div>

        <div class="toolbar">
            <button class="btn btn-primary" onclick="goAddQuestion()">新增题目</button>
            <button class="btn btn-gray" onclick="loadMyQuestionList()">刷新列表</button>
            <button class="btn btn-gray" onclick="goFormalQuestionBank()">正式题库</button>
            <button class="btn btn-gray" onclick="goHome()">返回首页</button>
        </div>

        <div class="toolbar">
            <input class="input" id="searchKeyword" placeholder="题目关键字">

            <select class="input" id="searchCourseId">
                <option value="">全部课程</option>
            </select>

            <select class="input" id="searchType">
                <option value="">全部题型</option>
                <option value="single">单选题</option>
                <option value="multiple">多选题</option>
                <option value="judge">判断题</option>
            </select>

            <select class="input" id="searchStatus">
                <option value="">全部状态</option>
                <option value="PENDING">待审核</option>
                <option value="REJECTED">已驳回</option>
            </select>

            <button class="btn btn-primary" onclick="loadMyQuestionList()">筛选</button>
            <button class="btn btn-gray" onclick="clearSearch()">清空</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div class="card">
        <div class="title">我的待审核 / 被驳回题目</div>

        <table class="table">
            <thead>
            <tr>
                <th style="width: 70px;">ID</th>
                <th>题目内容</th>
                <th style="width: 90px;">题型</th>
                <th style="width: 120px;">课程</th>
                <th style="width: 80px;">难度</th>
                <th style="width: 90px;">状态</th>
                <th style="width: 180px;">驳回原因</th>
                <th style="width: 160px;">提交时间</th>
                <th style="width: 150px;">操作</th>
            </tr>
            </thead>
            <tbody id="questionTableBody">
            <tr>
                <td colspan="9">加载中...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentUser = null;
    let courseList = [];

    function checkLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "TEACHER") {
            alert("当前账号没有访问我的题目的权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function showMessage(msg) {
        document.getElementById("message").textContent = msg || "";
    }

    function goAddQuestion() {
        window.location.href = "question-add.html";
    }

    function goFormalQuestionBank() {
        window.location.href = "question-manage.html";
    }

    function editQuestion(id) {
        window.location.href = "question-add.html?id=" + id;
    }

    function getQuestionTypeText(type) {
        switch (type) {
            case "single":
                return "单选题";
            case "multiple":
                return "多选题";
            case "judge":
                return "判断题";
            default:
                return type || "未知";
        }
    }

    function getStatusText(status) {
        switch (status) {
            case "PENDING":
                return `<span class="status-pending">待审核</span>`;
            case "REJECTED":
                return `<span class="status-rejected">已驳回</span>`;
            default:
                return status || "";
        }
    }

    function formatTime(value) {
        if (!value) {
            return "";
        }

        return String(value).replace("T", " ").substring(0, 19);
    }

    function getCourseNameById(courseId) {
        const course = courseList.find(item => Number(item.id) === Number(courseId));
        return course ? course.courseName : "";
    }

    async function loadCourseList() {
        try {
            const result = await get("/course/list");

            if (result.code !== 200) {
                showMessage(result.message || "课程列表加载失败");
                return;
            }

            courseList = result.data || [];
            renderCourseSelect();
        } catch (error) {
            console.error("加载课程列表失败：", error);
            showMessage("无法加载课程列表，请检查后端服务");
        }
    }

    function renderCourseSelect() {
        const select = document.getElementById("searchCourseId");
        const currentValue = select.value;

        select.innerHTML = `<option value="">全部课程</option>`;

        courseList.forEach(course => {
            if (course.status && course.status !== "ENABLED") {
                return;
            }

            const option = document.createElement("option");
            option.value = course.id;
            option.textContent = course.courseName || "";
            select.appendChild(option);
        });

        if (currentValue) {
            select.value = currentValue;
        }
    }

    function clearSearch() {
        document.getElementById("searchKeyword").value = "";
        document.getElementById("searchCourseId").value = "";
        document.getElementById("searchType").value = "";
        document.getElementById("searchStatus").value = "";
        loadMyQuestionList();
    }

    async function loadMyQuestionList() {
        const tbody = document.getElementById("questionTableBody");
        tbody.innerHTML = `<tr><td colspan="9">加载中...</td></tr>`;
        showMessage("");

        const keyword = document.getElementById("searchKeyword").value.trim();
        const courseId = document.getElementById("searchCourseId").value;
        const questionType = document.getElementById("searchType").value;
        const status = document.getElementById("searchStatus").value;

        const params = new URLSearchParams();
        params.append("pageNum", "1");
        params.append("pageSize", "1000");
        params.append("createUser", currentUser.id);

        if (status) params.append("status", status);
        if (courseId) params.append("courseId", courseId);
        if (questionType) params.append("questionType", questionType);
        if (keyword) params.append("keyword", keyword);

        try {
            const result = await get("/question/my/page?" + params.toString());

            if (result.code !== 200) {
                tbody.innerHTML = `<tr><td colspan="9">${result.message || "查询失败"}</td></tr>`;
                return;
            }

            const list = result.data?.records || [];

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="9">暂无待审核或被驳回题目</td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(q => {
                const reasonHtml = q.rejectReason
                    ? `<div class="reject-reason">${q.rejectReason}</div>`
                    : `<span style="color:#999;">无</span>`;

                const actionHtml = q.status === "REJECTED"
                    ? `<button class="btn btn-primary" onclick="editQuestion(${q.id})">修改并重新提交</button>`
                    : `<span style="color:#999;">等待审核</span>`;

                return `
                    <tr>
                        <td>${q.id ?? ""}</td>
                        <td style="text-align:left;">${q.questionText || ""}</td>
                        <td>${getQuestionTypeText(q.questionType)}</td>
                        <td>${q.course || getCourseNameById(q.courseId) || ""}</td>
                        <td>${q.difficulty ?? ""}</td>
                        <td>${getStatusText(q.status)}</td>
                        <td>${reasonHtml}</td>
                        <td>${formatTime(q.createTime)}</td>
                        <td>${actionHtml}</td>
                    </tr>
                `;
            }).join("");
        } catch (error) {
            console.error("加载我的题目失败：", error);
            tbody.innerHTML = `<tr><td colspan="9">无法连接后端</td></tr>`;
        }
    }

    async function initPage() {
        currentUser = checkLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + (currentUser.realName || currentUser.username || "") + "（教师）";

        await loadCourseList();
        await loadMyQuestionList();
    }

    initPage();
</script>

</body>
</html>
