<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷详情 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            margin-top: 10px;
        }

        .info-item {
            background: #f8fbff;
            border: 1px solid #e6f1fc;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 14px;
        }

        .info-label {
            color: #666;
            margin-bottom: 6px;
        }

        .info-value {
            font-weight: bold;
            color: #303133;
        }

        .question-card {
            border: 1px solid #ebeef5;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
            background: #fcfcfd;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .question-title {
            font-size: 16px;
            font-weight: bold;
            line-height: 1.7;
        }

        .score-tag {
            background: #e6a23c;
            color: white;
            padding: 5px 12px;
            border-radius: 16px;
            font-size: 13px;
            white-space: nowrap;
        }

        .question-meta {
            color: #666;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .option-list {
            line-height: 1.9;
            font-size: 14px;
            color: #333;
        }

        .answer {
            margin-top: 8px;
            color: #67c23a;
            font-weight: bold;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 30px 0;
        }

        @media (max-width: 800px) {
            .info-grid {
                grid-template-columns: 1fr;
            }

            .question-header {
                flex-direction: column;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title">试卷详情</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="actions">
            <button class="btn btn-gray" onclick="goBack()">返回试卷管理</button>
            <button class="btn btn-gray" onclick="goHome()">返回首页</button>
            <button class="btn btn-primary" id="editBtn" onclick="goEdit()">编辑试卷</button>
        </div>
        <div id="message" class="message"></div>
    </div>

    <div class="card">
        <div class="title">试卷基本信息</div>
        <div id="paperInfo">加载中...</div>
    </div>

    <div class="card">
        <div class="title">题目列表</div>
        <div id="questionList">加载中...</div>
    </div>
</div>

<script>
    let currentUser = null;
    let paperId = null;
    let paperDetail = null;
    let createUserName = "";

    function checkLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "TEACHER" && user.role !== "ADMIN") {
            alert("当前账号没有查看试卷详情权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function getIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
    }

    function showMessage(msg) {
        document.getElementById("message").textContent = msg || "";
    }

    function formatTime(timeStr) {
        if (!timeStr) return "";
        return timeStr.replace("T", " ");
    }

    function getQuestionTypeText(type) {
        switch (type) {
            case "single":
                return "单选题";
            case "multiple":
                return "多选题";
            case "judge":
                return "判断题";
            default:
                return type || "未知题型";
        }
    }

    function goBack() {
        window.location.href = "paper-manage.html";
    }

    function goEdit() {
        if (!paperId) {
            showMessage("缺少试卷ID，无法编辑");
            return;
        }

        window.location.href = "paper-edit.html?id=" + paperId;
    }

    async function loadPaperDetail() {
        const infoEl = document.getElementById("paperInfo");
        const questionEl = document.getElementById("questionList");

        infoEl.innerHTML = "加载中...";
        questionEl.innerHTML = "加载中...";
        showMessage("");

        try {
            const result = await get("/paper/" + paperId);

            if (result.code !== 200) {
                infoEl.innerHTML = "";
                questionEl.innerHTML = "";
                showMessage(result.message || "加载试卷详情失败");
                return;
            }

            paperDetail = result.data;

            await loadCreateUserName(paperDetail.createUser);

            renderPaperInfo();
            renderQuestionList();
        } catch (error) {
            console.error("加载试卷详情失败：", error);
            infoEl.innerHTML = "";
            questionEl.innerHTML = "";
            showMessage("无法连接后端，请检查服务是否启动");
        }
    }

    async function loadCreateUserName(userId) {
        createUserName = "";

        if (!userId) {
            return;
        }

        try {
            const result = await get("/user/user/" + userId);

            if (result.code === 200 && result.data) {
                createUserName = result.data.realName || result.data.username || "";
            }
        } catch (error) {
            console.error("加载创建人信息失败：", error);
        }
    }

    function renderPaperInfo() {
        document.getElementById("paperInfo").innerHTML = `
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">试卷ID</div>
                    <div class="info-value">${paperDetail.id ?? ""}</div>
                </div>

                <div class="info-item">
                    <div class="info-label">试卷名称</div>
                    <div class="info-value">${paperDetail.paperName || ""}</div>
                </div>

                <div class="info-item">
                    <div class="info-label">总分</div>
                    <div class="info-value">${paperDetail.totalScore ?? ""}</div>
                </div>

                <div class="info-item">
                    <div class="info-label">及格分数</div>
                    <div class="info-value">${paperDetail.passScore ?? ""}</div>
                </div>

                <div class="info-item">
                    <div class="info-label">创建人</div>
                    <div class="info-value">${createUserName ? createUserName + "（ID：" + paperDetail.createUser + "）" : "ID：" + (paperDetail.createUser ?? "")}</div>
                </div>

                <div class="info-item">
                    <div class="info-label">创建时间</div>
                    <div class="info-value">${formatTime(paperDetail.createTime)}</div>
                </div>
            </div>
        `;
    }

    function renderQuestionList() {
        const questions = paperDetail.questionList || [];

        if (questions.length === 0) {
            document.getElementById("questionList").innerHTML =
                '<div class="empty">该试卷暂无题目</div>';
            return;
        }

        document.getElementById("questionList").innerHTML = questions.map((q, index) => `
            <div class="question-card">
                <div class="question-header">
                    <div class="question-title">
                        ${index + 1}. ${q.questionText || ""}
                    </div>
                    <div class="score-tag">${q.score ?? 0} 分</div>
                </div>

                <div class="question-meta">
                    题目ID：${q.questionId ?? ""} ｜
                    题型：${getQuestionTypeText(q.questionType)} ｜
                    课程：${q.course || ""} ｜
                    难度：${q.difficulty ?? ""}
                </div>

                <div class="option-list">
                    <div>A：${q.optionA || ""}</div>
                    <div>B：${q.optionB || ""}</div>
                    <div>C：${q.optionC || ""}</div>
                    <div>D：${q.optionD || ""}</div>
                </div>

                <div class="answer">
                    正确答案：${q.correctAnswer || ""}
                </div>
            </div>
        `).join("");
    }

    function initPage() {
        currentUser = checkLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + currentUser.realName + "（" + currentUser.role + "）";

        paperId = getIdFromUrl();

        if (!paperId) {
            showMessage("缺少试卷ID，无法查看详情");
            document.getElementById("paperInfo").innerHTML = "";
            document.getElementById("questionList").innerHTML = "";
            return;
        }

        loadPaperDetail();
    }

    initPage();
</script>
</body>
</html>
