<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编辑试卷 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .form-item label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        .paper-layout {
            display: grid;
            grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
            gap: 16px;
            align-items: flex-start;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .toolbar .input {
            width: 170px;
        }

        .toolbar .keyword-input {
            width: 220px;
        }

        .checkbox-inline {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #555;
            padding: 0 6px;
        }

        .question-card,
        .selected-card {
            border: 1px solid #ebeef5;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            background: #fcfcfd;
        }

        .question-card.selected {
            border-color: #409eff;
            background: #f5faff;
        }

        .question-top,
        .selected-top {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            margin-bottom: 8px;
        }

        .question-title,
        .selected-title {
            font-weight: bold;
            line-height: 1.6;
        }

        .question-meta,
        .selected-meta {
            font-size: 13px;
            color: #666;
            line-height: 1.8;
        }

        .score-input {
            width: 90px;
        }

        .selected-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            background: #409eff;
            color: #fff;
            font-size: 12px;
            margin-left: 8px;
        }

        .summary-box {
            border: 1px solid #ebeef5;
            border-radius: 10px;
            padding: 12px;
            background: #f8f9fb;
            margin-bottom: 14px;
            line-height: 1.9;
            font-size: 14px;
        }

        .summary-main {
            font-weight: bold;
            color: #333;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .empty-text {
            color: #999;
            padding: 16px 0;
            text-align: center;
        }

        @media (max-width: 1000px) {
            .paper-layout {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 800px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .question-top,
            .selected-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .toolbar .input,
            .toolbar .keyword-input {
                width: 100%;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title" id="pageTitle">新增试卷</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="title">试卷基本信息</div>

        <input type="hidden" id="paperId">

        <div class="form-grid">
            <div class="form-item">
                <label>试卷名称</label>
                <input class="input" id="paperName" placeholder="请输入试卷名称">
            </div>

            <div class="form-item">
                <label>总分</label>
                <input class="input" id="totalScore" type="number" placeholder="根据已选题目自动计算">
            </div>

            <div class="form-item">
                <label>及格分数</label>
                <input class="input" id="passScore" type="number" placeholder="例如：60">
            </div>

            <div class="form-item">
                <label>试卷时长（分钟）</label>
                <input class="input" id="duration" type="number" placeholder="例如：90">
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div class="paper-layout">
        <div class="card">
            <div class="title">题库筛选</div>

            <div class="toolbar">
                <input class="input keyword-input" id="keyword" placeholder="按题目内容筛选">
                <input class="input" id="course" placeholder="课程名称">

                <select class="input" id="questionType">
                    <option value="">全部题型</option>
                    <option value="single">单选题</option>
                    <option value="multiple">多选题</option>
                    <option value="judge">判断题</option>
                </select>

                <select class="input" id="difficulty">
                    <option value="">全部难度</option>
                    <option value="1">1 - 简单</option>
                    <option value="2">2 - 普通</option>
                    <option value="3">3 - 困难</option>
                </select>

                <label class="checkbox-inline">
                    <input type="checkbox" id="onlyUnselected" onchange="renderQuestionList()">
                    只看未选
                </label>

                <button class="btn btn-primary" onclick="searchQuestions()">筛选</button>
                <button class="btn btn-gray" onclick="clearFilter()">清空筛选</button>
            </div>

            <div id="questionList">题目加载中...</div>

            <div class="pagination">
                <button class="btn btn-gray" onclick="prevPage()">上一页</button>
                <span id="pageInfo">第 1 页</span>
                <button class="btn btn-gray" onclick="nextPage()">下一页</button>
            </div>
        </div>

        <div class="card">
            <div class="title">已选题目</div>
            <div id="selectedSummary" class="summary-box"></div>
            <div id="selectedQuestionList"></div>
        </div>
    </div>

    <div class="card">
        <div class="actions">
            <button class="btn btn-primary" onclick="savePaper()">保存试卷</button>
            <button class="btn btn-gray" onclick="goBack()">返回试卷管理</button>
            <button class="btn btn-gray" onclick="goHome()">返回首页</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let paperId = null;
    let currentQuestionList = [];
    let selectedQuestionMap = {};
    let pageNum = 1;
    let pageSize = 10;
    let total = 0;

    function checkLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "TEACHER" && user.role !== "ADMIN") {
            alert("当前账号没有试卷编辑权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function getIdFromUrl() {
        const params = new URLSearchParams(window.location.search);
        return params.get("id");
    }

    function showMessage(msg) {
        document.getElementById("message").textContent = msg || "";
    }

    function goBack() {
        window.location.href = "paper-manage.html";
    }

    function getQuestionTypeText(type) {
        switch (type) {
            case "single": return "单选题";
            case "multiple": return "多选题";
            case "judge": return "判断题";
            default: return type || "未知题型";
        }
    }

    function getDifficultyText(difficulty) {
        switch (Number(difficulty)) {
            case 1: return "简单";
            case 2: return "普通";
            case 3: return "困难";
            default: return difficulty || "";
        }
    }

    function buildQuestionParams() {
        const keyword = document.getElementById("keyword").value.trim();
        const course = document.getElementById("course").value.trim();
        const questionType = document.getElementById("questionType").value;
        const difficulty = document.getElementById("difficulty").value;

        const params = new URLSearchParams();
        params.append("pageNum", String(pageNum));
        params.append("pageSize", String(pageSize));

        if (keyword) params.append("keyword", keyword);
        if (course) params.append("course", course);
        if (questionType) params.append("questionType", questionType);
        if (difficulty) params.append("difficulty", difficulty);

        return params;
    }

    async function loadQuestions() {
        const box = document.getElementById("questionList");
        box.innerHTML = "题目加载中...";

        try {
            const result = await get("/question/page?" + buildQuestionParams().toString());

            if (result.code !== 200) {
                box.innerHTML = result.message || "题目加载失败";
                return;
            }

            currentQuestionList = result.data?.records || [];
            total = Number(result.data?.total || 0);
            renderQuestionList();
            renderPageInfo();
        } catch (error) {
            console.error("加载题库失败：", error);
            box.innerHTML = "无法连接后端";
        }
    }

    async function loadPaperDetail(id) {
        try {
            const result = await get("/paper/" + id);

            if (result.code !== 200) {
                showMessage(result.message || "加载试卷失败");
                return;
            }

            const paper = result.data;

            document.getElementById("pageTitle").textContent = "编辑试卷";
            document.getElementById("paperId").value = paper.id;
            document.getElementById("paperName").value = paper.paperName || "";
            document.getElementById("totalScore").value = paper.totalScore || "";
            document.getElementById("passScore").value = paper.passScore || "";
            document.getElementById("duration").value = paper.duration || "";

            selectedQuestionMap = {};

            (paper.questionList || []).forEach(q => {
                selectedQuestionMap[q.questionId] = {
                    questionId: q.questionId,
                    questionText: q.questionText || "",
                    questionType: q.questionType || "",
                    course: q.course || "",
                    difficulty: q.difficulty,
                    score: Number(q.score || 0)
                };
            });

            calculateTotalScore();
            renderQuestionList();
            renderSelectedQuestions();
        } catch (error) {
            console.error("加载试卷详情失败：", error);
            showMessage("无法连接后端");
        }
    }

    function searchQuestions() {
        pageNum = 1;
        loadQuestions();
    }

    function clearFilter() {
        document.getElementById("keyword").value = "";
        document.getElementById("course").value = "";
        document.getElementById("questionType").value = "";
        document.getElementById("difficulty").value = "";
        document.getElementById("onlyUnselected").checked = false;
        pageNum = 1;
        loadQuestions();
    }

    function getVisibleQuestions() {
        const onlyUnselected = document.getElementById("onlyUnselected").checked;
        if (!onlyUnselected) {
            return currentQuestionList;
        }
        return currentQuestionList.filter(q => !selectedQuestionMap[q.id]);
    }

    function renderQuestionList() {
        const box = document.getElementById("questionList");
        const list = getVisibleQuestions();

        if (list.length === 0) {
            box.innerHTML = '<div class="empty-text">暂无符合条件的题目</div>';
            return;
        }

        box.innerHTML = list.map(q => {
            const selected = selectedQuestionMap[q.id] !== undefined;
            const score = selected ? selectedQuestionMap[q.id].score : "";

            return `
                <div class="question-card ${selected ? "selected" : ""}">
                    <div class="question-top">
                        <label class="question-title">
                            <input type="checkbox"
                                   ${selected ? "checked" : ""}
                                   onchange="toggleQuestion(${q.id}, this.checked)">
                            ${q.questionText || ""}
                            ${selected ? '<span class="selected-tag">已选</span>' : ''}
                        </label>

                        <div>
                            分值：
                            <input class="input score-input"
                                   type="number"
                                   min="0"
                                   value="${score}"
                                   onchange="changeQuestionScore(${q.id}, this.value)">
                        </div>
                    </div>

                    <div class="question-meta">
                        <div>题目ID：${q.id} ｜ 题型：${getQuestionTypeText(q.questionType)} ｜ 课程：${q.course || ""} ｜ 难度：${getDifficultyText(q.difficulty)}</div>
                        <div>A：${q.optionA || ""}</div>
                        <div>B：${q.optionB || ""}</div>
                        <div>C：${q.optionC || ""}</div>
                        <div>D：${q.optionD || ""}</div>
                        <div>正确答案：${q.correctAnswer || ""}</div>
                    </div>
                </div>
            `;
        }).join("");
    }

    function toggleQuestion(questionId, checked) {
        const question = currentQuestionList.find(q => Number(q.id) === Number(questionId));

        if (checked) {
            if (!selectedQuestionMap[questionId]) {
                selectedQuestionMap[questionId] = {
                    questionId: questionId,
                    questionText: question?.questionText || "",
                    questionType: question?.questionType || "",
                    course: question?.course || "",
                    difficulty: question?.difficulty,
                    score: 0
                };
            }
        } else {
            delete selectedQuestionMap[questionId];
        }

        calculateTotalScore();
        renderQuestionList();
        renderSelectedQuestions();
    }

    function changeQuestionScore(questionId, value) {
        const question = currentQuestionList.find(q => Number(q.id) === Number(questionId));

        if (!selectedQuestionMap[questionId]) {
            selectedQuestionMap[questionId] = {
                questionId: questionId,
                questionText: question?.questionText || "",
                questionType: question?.questionType || "",
                course: question?.course || "",
                difficulty: question?.difficulty,
                score: 0
            };
        }

        selectedQuestionMap[questionId].score = Number(value || 0);
        calculateTotalScore();
        renderQuestionList();
        renderSelectedQuestions();
    }

    function removeSelectedQuestion(questionId) {
        delete selectedQuestionMap[questionId];
        calculateTotalScore();
        renderQuestionList();
        renderSelectedQuestions();
    }

    function changeSelectedScore(questionId, value) {
        if (selectedQuestionMap[questionId]) {
            selectedQuestionMap[questionId].score = Number(value || 0);
        }
        calculateTotalScore();
        renderQuestionList();
        renderSelectedQuestions();
    }

    function calculateTotalScore() {
        let totalScore = 0;

        Object.values(selectedQuestionMap).forEach(item => {
            totalScore += Number(item.score || 0);
        });

        document.getElementById("totalScore").value = totalScore;
        renderSelectedSummary(totalScore);
    }

    function renderSelectedSummary(totalScore) {
        const list = Object.values(selectedQuestionMap);
        const summary = {
            single: { count: 0, score: 0 },
            multiple: { count: 0, score: 0 },
            judge: { count: 0, score: 0 }
        };

        list.forEach(item => {
            const type = item.questionType;
            if (summary[type]) {
                summary[type].count += 1;
                summary[type].score += Number(item.score || 0);
            }
        });

        document.getElementById("selectedSummary").innerHTML = `
            <div class="summary-main">已选 ${list.length} 道题，当前总分 ${totalScore} 分</div>
            <div>单选题：${summary.single.count} 道，共 ${summary.single.score} 分</div>
            <div>多选题：${summary.multiple.count} 道，共 ${summary.multiple.score} 分</div>
            <div>判断题：${summary.judge.count} 道，共 ${summary.judge.score} 分</div>
        `;
    }

    function renderSelectedQuestions() {
        const box = document.getElementById("selectedQuestionList");
        const list = Object.values(selectedQuestionMap);

        if (list.length === 0) {
            box.innerHTML = '<div class="empty-text">暂未选择题目</div>';
            renderSelectedSummary(0);
            return;
        }

        box.innerHTML = list.map(item => `
            <div class="selected-card">
                <div class="selected-top">
                    <div class="selected-title">${item.questionText || "题目ID：" + item.questionId}</div>
                    <button class="btn btn-danger" onclick="removeSelectedQuestion(${item.questionId})">移除</button>
                </div>
                <div class="selected-meta">
                    <div>题目ID：${item.questionId} ｜ 题型：${getQuestionTypeText(item.questionType)} ｜ 课程：${item.course || ""} ｜ 难度：${getDifficultyText(item.difficulty)}</div>
                    <div>
                        分值：
                        <input class="input score-input"
                               type="number"
                               min="0"
                               value="${item.score}"
                               onchange="changeSelectedScore(${item.questionId}, this.value)">
                    </div>
                </div>
            </div>
        `).join("");
    }

    function renderPageInfo() {
        const totalPage = Math.max(1, Math.ceil(total / pageSize));
        document.getElementById("pageInfo").textContent = `第 ${pageNum} / ${totalPage} 页，共 ${total} 道题`;
    }

    function prevPage() {
        if (pageNum <= 1) {
            return;
        }
        pageNum -= 1;
        loadQuestions();
    }

    function nextPage() {
        const totalPage = Math.max(1, Math.ceil(total / pageSize));
        if (pageNum >= totalPage) {
            return;
        }
        pageNum += 1;
        loadQuestions();
    }

    function buildPaperData() {
        const id = document.getElementById("paperId").value;
        const paperName = document.getElementById("paperName").value.trim();
        const totalScore = document.getElementById("totalScore").value;
        const passScore = document.getElementById("passScore").value;
        const duration = document.getElementById("duration").value;

        if (!paperName) {
            showMessage("请输入试卷名称");
            return null;
        }

        const questionList = Object.values(selectedQuestionMap)
            .filter(item => Number(item.score) > 0)
            .map(item => ({
                questionId: Number(item.questionId),
                score: Number(item.score)
            }));

        if (questionList.length === 0) {
            showMessage("请至少选择一道题目，并设置大于0的分值");
            return null;
        }

        if (!totalScore || Number(totalScore) <= 0) {
            showMessage("总分必须大于0");
            return null;
        }

        if (!passScore || Number(passScore) <= 0) {
            showMessage("及格分数必须大于0");
            return null;
        }

        if (Number(passScore) > Number(totalScore)) {
            showMessage("及格分数不能大于总分");
            return null;
        }

        if (!duration || Number(duration) <= 0) {
            showMessage("试卷时长必须大于0");
            return null;
        }

        const data = {
            paperName: paperName,
            totalScore: Number(totalScore),
            duration: Number(duration),
            passScore: Number(passScore),
            createUser: Number(currentUser.id),
            questionList: questionList
        };

        if (id) {
            data.id = Number(id);
        }

        return data;
    }

    async function savePaper() {
        calculateTotalScore();
        const data = buildPaperData();

        if (!data) {
            return;
        }

        try {
            const result = data.id
                ? await put("/paper", data)
                : await post("/paper", data);

            if (result.code !== 200) {
                showMessage(result.message || "保存失败");
                return;
            }

            alert(result.message || "保存成功");
            window.location.href = "paper-manage.html";
        } catch (error) {
            console.error("保存试卷失败：", error);
            showMessage("无法连接后端，请检查服务是否启动");
        }
    }

    async function initPage() {
        currentUser = checkLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + currentUser.realName + "（" + currentUser.role + "）";

        paperId = getIdFromUrl();

        renderSelectedQuestions();
        await loadQuestions();

        if (paperId) {
            await loadPaperDetail(paperId);
        }
    }

    initPage();
</script>
</body>
</html>
