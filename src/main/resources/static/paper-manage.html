<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷管理 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        .top-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .search-bar .input {
            width: 240px;
        }

        .table th,
        .table td {
            vertical-align: middle;
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 24px 0;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 18px;
            flex-wrap: wrap;
        }

        .page-size-box {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #555;
        }

        .page-size-box select {
            width: 90px;
        }

        @media (max-width: 900px) {
            .table {
                font-size: 12px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .search-bar .input {
                width: 100%;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title">试卷管理</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="title">试卷操作</div>

        <div class="top-actions">
            <button class="btn btn-primary" onclick="window.location.href='paper-edit.html'">新增试卷</button>
            <button class="btn btn-primary" onclick="goRandomPaper()">随机组卷</button>
            <button class="btn btn-gray" onclick="loadPaperPage()">刷新列表</button>
            <button class="btn btn-gray" onclick="goHome()">返回首页</button>
        </div>

        <div class="search-bar">
            <input class="input" id="searchPaperName" placeholder="请输入试卷名称关键字">
            <button class="btn btn-primary" onclick="searchPaper()">搜索</button>
            <button class="btn btn-gray" onclick="clearSearch()">清空</button>

            <div class="page-size-box">
                <span>每页</span>
                <select class="input" id="pageSizeSelect" onchange="changePageSize()">
                    <option value="5">5 条</option>
                    <option value="10" selected>10 条</option>
                    <option value="20">20 条</option>
                    <option value="50">50 条</option>
                </select>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div class="card">
        <div class="title">试卷列表</div>

        <table class="table">
            <thead>
            <tr>
                <th style="width: 80px;">ID</th>
                <th>试卷名称</th>
                <th style="width: 100px;">总分</th>
                <th style="width: 100px;">及格分</th>
                <th style="width: 100px;">创建人</th>
                <th style="width: 180px;">创建时间</th>
                <th style="width: 260px;">操作</th>
            </tr>
            </thead>
            <tbody id="paperTableBody">
            <tr>
                <td colspan="7">加载中...</td>
            </tr>
            </tbody>
        </table>

        <div class="pagination">
            <button class="btn btn-gray" onclick="prevPage()">上一页</button>
            <span id="pageInfo">第 1 页</span>
            <button class="btn btn-gray" onclick="nextPage()">下一页</button>
        </div>
    </div>
</div>

<script>
    let currentUser = null;
    let paperList = [];
    let pageNum = 1;
    let pageSize = 10;
    let total = 0;

    function checkLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "TEACHER" && user.role !== "ADMIN") {
            alert("当前账号没有试卷管理权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function showMessage(msg) {
        document.getElementById("message").textContent = msg || "";
    }

    function formatTime(timeStr) {
        if (!timeStr) {
            return "";
        }
        return timeStr.replace("T", " ");
    }

    function goRandomPaper() {
        window.location.href = "paper-random.html";
    }

    function goEditPaper(id) {
        window.location.href = "paper-edit.html?id=" + id;
    }

    function goDetailPaper(id) {
        window.location.href = "paper-detail.html?id=" + id;
    }

    function buildPageParams() {
        const paperName = document.getElementById("searchPaperName").value.trim();

        const params = new URLSearchParams();
        params.append("pageNum", String(pageNum));
        params.append("pageSize", String(pageSize));

        if (paperName) {
            params.append("paperName", paperName);
        }

        return params;
    }

    async function loadPaperPage() {
        const tbody = document.getElementById("paperTableBody");
        tbody.innerHTML = `<tr><td colspan="7">加载中...</td></tr>`;
        showMessage("");

        try {
            const result = await get("/paper/page?" + buildPageParams().toString());

            if (result.code !== 200) {
                tbody.innerHTML = `<tr><td colspan="7">${result.message || "查询失败"}</td></tr>`;
                return;
            }

            paperList = result.data?.records || [];
            total = Number(result.data?.total || 0);

            renderPaperTable();
            renderPageInfo();
        } catch (error) {
            console.error("加载试卷列表失败：", error);
            tbody.innerHTML = `<tr><td colspan="7">无法连接后端</td></tr>`;
        }
    }

    function renderPaperTable() {
        const tbody = document.getElementById("paperTableBody");

        if (paperList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty">暂无试卷</td></tr>`;
            return;
        }

        tbody.innerHTML = paperList.map(paper => `
            <tr>
                <td>${paper.id ?? ""}</td>
                <td>${paper.paperName || ""}</td>
                <td>${paper.totalScore ?? ""}</td>
                <td>${paper.passScore ?? ""}</td>
                <td>${paper.createUser ?? ""}</td>
                <td>${formatTime(paper.createTime)}</td>
                <td>
                    <div class="action-buttons">
                        <button class="btn btn-primary" onclick="goDetailPaper(${paper.id})">详情</button>
                        <button class="btn btn-primary" onclick="goEditPaper(${paper.id})">编辑</button>
                        <button class="btn btn-danger" onclick="deletePaper(${paper.id})">删除</button>
                    </div>
                </td>
            </tr>
        `).join("");
    }

    function renderPageInfo() {
        const totalPage = Math.max(1, Math.ceil(total / pageSize));
        document.getElementById("pageInfo").textContent =
            `第 ${pageNum} / ${totalPage} 页，共 ${total} 条`;
    }

    function searchPaper() {
        pageNum = 1;
        loadPaperPage();
    }

    function clearSearch() {
        document.getElementById("searchPaperName").value = "";
        pageNum = 1;
        loadPaperPage();
    }

    function changePageSize() {
        pageSize = Number(document.getElementById("pageSizeSelect").value);
        pageNum = 1;
        loadPaperPage();
    }

    function prevPage() {
        if (pageNum <= 1) {
            return;
        }

        pageNum -= 1;
        loadPaperPage();
    }

    function nextPage() {
        const totalPage = Math.max(1, Math.ceil(total / pageSize));

        if (pageNum >= totalPage) {
            return;
        }

        pageNum += 1;
        loadPaperPage();
    }

    async function deletePaper(id) {
        const ok = confirm("确认删除该试卷吗？删除后该试卷与题目的关联也会被删除。");

        if (!ok) {
            return;
        }

        try {
            const result = await del("/paper/" + id);

            if (result.code !== 200) {
                showMessage(result.message || "删除失败");
                return;
            }

            showMessage(result.message || "删除成功");

            if (paperList.length === 1 && pageNum > 1) {
                pageNum -= 1;
            }

            loadPaperPage();
        } catch (error) {
            console.error("删除试卷失败：", error);
            showMessage("无法连接后端，请检查服务是否启动");
        }
    }

    function initPage() {
        currentUser = checkLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + currentUser.realName + "（" + currentUser.role + "）";

        loadPaperPage();
    }

    initPage();
</script>
</body>
</html>
