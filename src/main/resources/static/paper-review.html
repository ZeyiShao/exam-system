<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷审核 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .toolbar .input {
            width: 240px;
        }

        .tip-box {
            background: #f8fbff;
            border: 1px solid #e6f1fc;
            border-radius: 8px;
            padding: 14px;
            color: #666;
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 18px;
        }

        .status-pending {
            color: #d48806;
            font-weight: bold;
        }

        @media (max-width: 900px) {
            .toolbar .input {
                width: 100%;
            }

            .table {
                font-size: 12px;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title">试卷审核</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <div class="title">待审核试卷</div>

        <div class="tip-box">
            该页面用于管理员审核教师创建的试卷。试卷审核通过后，才可以被考试创建页面选择并用于发布考试。
        </div>

        <div class="toolbar">
            <input class="input" id="searchPaperName" placeholder="请输入试卷名称关键字">
            <button class="btn btn-primary" onclick="loadReviewList()">筛选</button>
            <button class="btn btn-gray" onclick="clearSearch()">清空</button>
            <button class="btn btn-gray" onclick="goHome()">返回首页</button>
        </div>

        <div id="message" class="message"></div>
    </div>

    <div class="card">
        <div class="title">待审核列表</div>

        <table class="table">
            <thead>
            <tr>
                <th style="width: 70px;">ID</th>
                <th>试卷名称</th>
                <th style="width: 90px;">总分</th>
                <th style="width: 90px;">及格分</th>
                <th style="width: 100px;">时长</th>
                <th style="width: 110px;">组卷方式</th>
                <th style="width: 100px;">创建人ID</th>
                <th style="width: 160px;">创建时间</th>
                <th style="width: 90px;">状态</th>
                <th style="width: 130px;">操作</th>
            </tr>
            </thead>
            <tbody id="paperTableBody">
            <tr>
                <td colspan="10">加载中...</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    let currentUser = null;

    function checkLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "ADMIN") {
            alert("当前账号没有试卷审核权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function showMessage(msg) {
        document.getElementById("message").textContent = msg || "";
    }

    function formatTime(value) {
        if (!value) {
            return "";
        }

        return String(value).replace("T", " ").substring(0, 19);
    }

    function getPaperTypeText(type) {
        switch (type) {
            case "MANUAL":
                return "手动组卷";
            case "RANDOM":
                return "随机组卷";
            default:
                return type || "";
        }
    }

    function getStatusText(status) {
        if (status === "PENDING") {
            return `<span class="status-pending">待审核</span>`;
        }

        return status || "";
    }

    function goDetail(id) {
        window.location.href = "paper-review-detail.html?id=" + id;
    }

    function clearSearch() {
        document.getElementById("searchPaperName").value = "";
        loadReviewList();
    }

    async function loadReviewList() {
        const tbody = document.getElementById("paperTableBody");
        tbody.innerHTML = `<tr><td colspan="10">加载中...</td></tr>`;
        showMessage("");

        const paperName = document.getElementById("searchPaperName").value.trim();

        const params = new URLSearchParams();
        params.append("pageNum", "1");
        params.append("pageSize", "1000");

        if (paperName) {
            params.append("paperName", paperName);
        }

        try {
            const result = await get("/paper/review/page?" + params.toString());

            if (result.code !== 200) {
                tbody.innerHTML = `<tr><td colspan="10">${result.message || "查询失败"}</td></tr>`;
                return;
            }

            const list = result.data?.records || [];

            if (list.length === 0) {
                tbody.innerHTML = `<tr><td colspan="10">暂无待审核试卷</td></tr>`;
                return;
            }

            tbody.innerHTML = list.map(paper => `
                <tr>
                    <td>${paper.id ?? ""}</td>
                    <td style="text-align:left;">${paper.paperName || ""}</td>
                    <td>${paper.totalScore ?? ""}</td>
                    <td>${paper.passScore ?? ""}</td>
                    <td>${paper.duration ?? ""} 分钟</td>
                    <td>${getPaperTypeText(paper.paperType)}</td>
                    <td>${paper.createUser ?? ""}</td>
                    <td>${formatTime(paper.createTime)}</td>
                    <td>${getStatusText(paper.status)}</td>
                    <td>
                        <button class="btn btn-primary" onclick="goDetail(${paper.id})">查看审核</button>
                    </td>
                </tr>
            `).join("");
        } catch (error) {
            console.error("加载待审核试卷失败：", error);
            tbody.innerHTML = `<tr><td colspan="10">无法连接后端</td></tr>`;
        }
    }

    async function initPage() {
        currentUser = checkLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + (currentUser.realName || currentUser.username || "") + "（管理员）";

        await loadReviewList();
    }

    initPage();
</script>

</body>
</html>
