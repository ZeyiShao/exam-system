<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教师首页 - 在线考试系统</title>

    <link rel="stylesheet" href="css/common.css">
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>

    <style>
        .home-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 22px;
        }

        .home-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
            padding: 26px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #ebeef5;
        }

        .home-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.10);
            border-color: #409eff;
        }

        .home-card-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #303133;
        }

        .home-card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.8;
        }

        .welcome {
            margin-bottom: 24px;
        }

        .welcome-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .welcome-desc {
            color: #666;
            line-height: 1.8;
        }

        .user-box {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 14px;
        }

        @media (max-width: 800px) {
            .home-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
<div class="header">
    <div class="title">教师端首页</div>
    <div class="user-box">
        <span id="userText">未登录</span>
        <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
</div>

<div class="container">
    <div class="card welcome">
        <div class="welcome-title">欢迎进入在线考试系统教师端</div>
        <div class="welcome-desc">
            教师端主要用于题库管理、试卷管理、考试发布、考试成绩查看和成绩统计。
            你可以从下方功能入口进入对应模块。
        </div>
    </div>

    <div class="home-grid">
        <div class="home-card" onclick="goPage('question-manage.html')">
            <div class="home-card-title">题库管理</div>
            <div class="home-card-desc">
                管理单选题、多选题、判断题等题目内容，为试卷组卷提供题目来源。
            </div>
        </div>

        <div class="home-card" onclick="goPage('paper-manage.html')">
            <div class="home-card-title">试卷管理</div>
            <div class="home-card-desc">
                创建和维护试卷，选择题目并设置每道题分值，也可以查看试卷详情。
            </div>
        </div>

        <div class="home-card" onclick="goPage('exam-manage.html')">
            <div class="home-card-title">考试管理</div>
            <div class="home-card-desc">
                发布考试，设置考试时间、考试班级、课程和关联试卷。
            </div>
        </div>

        <div class="home-card" onclick="goPage('exam-score.html')">
            <div class="home-card-title">成绩查看</div>
            <div class="home-card-desc">
                查看某场考试下学生成绩、提交时间和是否通过。
            </div>
        </div>

        <div class="home-card" onclick="goPage('exam-statistics.html')">
            <div class="home-card-title">成绩统计</div>
            <div class="home-card-desc">
                查看考试平均分、最高分、最低分等基础统计数据。
            </div>
        </div>
    </div>
</div>

<script>
    let currentUser = null;

    function checkTeacherLogin() {
        const user = getUser();

        if (!user) {
            return null;
        }

        if (user.role !== "TEACHER" && user.role !== "ADMIN") {
            alert("当前账号没有教师端访问权限");
            window.location.href = "login.html";
            return null;
        }

        return user;
    }

    function goPage(url) {
        window.location.href = url;
    }

    function initPage() {
        currentUser = checkTeacherLogin();

        if (!currentUser) {
            return;
        }

        document.getElementById("userText").textContent =
            "当前用户：" + currentUser.realName + "（" + currentUser.role + "）";
    }

    initPage();
</script>
</body>
</html>
